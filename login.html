<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Nouvelair ESG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #1a2b4a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle dot pattern texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 
                        0 0 1px rgba(0, 0, 0, 0.1);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background-color: #2ecc71;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
        }

        .title {
            text-align: center;
            color: #1a2b4a;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #1a2b4a;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #2ecc71;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: 18px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #2ecc71;
        }

        .password-input {
            padding-right: 40px;
        }

        .login-button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 24px;
        }

        .login-button:hover:not(:disabled) {
            background-color: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(46, 204, 113, 0.3);
        }

        .login-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-button:disabled {
            background-color: #95d5b2;
            cursor: not-allowed;
        }

        .error-message {
            display: none;
            color: #dc2626;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            text-align: center;
            color: #9ca3af;
            font-size: 12px;
            margin-top: 32px;
        }

        .signup-link-container {
            text-align: center;
            margin-top: 16px;
        }

        .signup-link {
            color: #2ecc71;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .signup-link:hover {
            color: #27ae60;
            text-decoration: underline;
        }

        .success-message {
            display: none;
            color: #059669;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-title {
            text-align: center;
            color: #1a2b4a;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
        }

        .modal-close-link {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-top: 20px;
        }

        .modal-close-link a {
            color: #2ecc71;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .modal-close-link a:hover {
            color: #27ae60;
        }

        .signup-button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 24px;
        }

        .signup-button:hover:not(:disabled) {
            background-color: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(46, 204, 113, 0.3);
        }

        .signup-button:disabled {
            background-color: #95d5b2;
            cursor: not-allowed;
        }

        .status-options {
            display: flex;
            gap: 24px;
        }

        .status-radio {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            color: #1a2b4a;
        }

        .status-radio input[type="radio"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: #2ecc71;
        }

        .modal-error-message {
            display: none;
            color: #dc2626;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        .modal-error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px;
            }

            .title {
                font-size: 22px;
            }

            .subtitle {
                font-size: 13px;
            }

            .modal-content {
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo">✈</div>
            </div>

            <h1 class="title">Nouvelair</h1>
            <p class="subtitle">Plateforme de Pilotage ESG</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="votre@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input password-input" 
                            placeholder="Votre mot de passe"
                            required
                        >
                        <button 
                            type="button" 
                            class="toggle-password" 
                            id="togglePassword"
                            aria-label="Afficher/Masquer le mot de passe"
                        >
                            👁
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-button" id="loginButton">Se connecter</button>

                <div class="error-message" id="errorMessage"></div>

                <div class="signup-link-container">
                    <a href="#" class="signup-link" id="signupLink">Pas encore de compte ? S'inscrire</a>
                </div>
            </form>

            <div class="footer">
                © 2025 Nouvelair — Plateforme ESG v1.0
            </div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="signupModal">
        <div class="modal-content">
            <h2 class="modal-title">Créer un compte</h2>

            <form id="signupForm">
                <div class="form-group">
                    <label for="fullName" class="form-label">Nom complet</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        class="form-input" 
                        placeholder="Votre nom complet"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupEmail" class="form-label">Email</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        class="form-input" 
                        placeholder="votre@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupPassword" class="form-label">Mot de passe</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="signupPassword" 
                            class="form-input password-input" 
                            placeholder="Minimum 6 caractères"
                            minlength="6"
                            required
                        >
                        <button 
                            type="button" 
                            class="toggle-password" 
                            id="toggleSignupPassword"
                            aria-label="Afficher/Masquer le mot de passe"
                        >
                            👁
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <p style="color:#6b7280;font-size:14px; line-height:1.6;">
                        Créez ici un compte administrateur. Seul l’admin peut s’inscrire directement via cet écran.
                    </p>
                </div>

                <button type="submit" class="signup-button" id="signupButton">S'inscrire</button>

                <div class="modal-error-message" id="modalErrorMessage"></div>
                <div class="success-message" id="successMessage"></div>
            </form>

            <div class="modal-close-link">
                Déjà un compte ? <a href="#" id="closeSignupModal">Se connecter</a>
            </div>
        </div>
    </div>

    <script src="fetch.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const errorMessage = document.getElementById('errorMessage');
        const signupLink = document.getElementById('signupLink');
        const signupModal = document.getElementById('signupModal');
        const signupForm = document.getElementById('signupForm');
        const fullNameInput = document.getElementById('fullName');
        const signupEmailInput = document.getElementById('signupEmail');
        const signupPasswordInput = document.getElementById('signupPassword');
        const toggleSignupPasswordBtn = document.getElementById('toggleSignupPassword');
        const signupButton = document.getElementById('signupButton');
        const modalErrorMessage = document.getElementById('modalErrorMessage');
        const successMessage = document.getElementById('successMessage');
        const closeSignupModal = document.getElementById('closeSignupModal');

        // ===== LOGIN LOGIC =====
        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordBtn.textContent = isPassword ? '🙈' : '👁';
        });

        // Clear error message when user starts typing
        emailInput.addEventListener('input', clearError);
        passwordInput.addEventListener('input', clearError);

        function clearError() {
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        async function handleLogin(e) {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validate inputs
            if (!email || !password) {
                showError('Email ou mot de passe incorrect');
                return;
            }

            // Show loading state
            loginButton.disabled = true;
            loginButton.textContent = 'Connexion...';
            clearError();

            const result = await loginUser(email, password);

            if (result.success) {
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                showError(result.error);
                // Reset button state
                loginButton.disabled = false;
                loginButton.textContent = 'Se connecter';
            }
        }

        loginForm.addEventListener('submit', handleLogin);

        // ===== SIGNUP LOGIC =====
        // Open signup modal
        signupLink.addEventListener('click', (e) => {
            e.preventDefault();
            signupModal.classList.add('show');
        });

        // Close signup modal
        closeSignupModal.addEventListener('click', (e) => {
            e.preventDefault();
            signupModal.classList.remove('show');
            resetSignupForm();
        });

        // Close modal when clicking outside
        signupModal.addEventListener('click', (e) => {
            if (e.target === signupModal) {
                signupModal.classList.remove('show');
                resetSignupForm();
            }
        });

        // Toggle signup password visibility
        toggleSignupPasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = signupPasswordInput.type === 'password';
            signupPasswordInput.type = isPassword ? 'text' : 'password';
            toggleSignupPasswordBtn.textContent = isPassword ? '🙈' : '👁';
        });

        // Clear modal error when user starts typing
        fullNameInput.addEventListener('input', clearModalError);
        signupEmailInput.addEventListener('input', clearModalError);
        signupPasswordInput.addEventListener('input', clearModalError);

        function clearModalError() {
            modalErrorMessage.classList.remove('show');
            modalErrorMessage.textContent = '';
        }

        function showModalError(message) {
            modalErrorMessage.textContent = message;
            modalErrorMessage.classList.add('show');
        }

        function showSuccessMessage(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }

        function resetSignupForm() {
            signupForm.reset();
            clearModalError();
            successMessage.classList.remove('show');
            successMessage.textContent = '';
            signupPasswordInput.type = 'password';
            toggleSignupPasswordBtn.textContent = '👁';
        }

        async function handleSignup(e) {
            e.preventDefault();

            const fullName = fullNameInput.value.trim();
            const email = signupEmailInput.value.trim();
            const password = signupPasswordInput.value;
            const role = 'ADMIN';
            const isActive = '1';

            // Validate inputs
            if (!fullName || !email || !password) {
                showModalError('Tous les champs sont obligatoires');
                return;
            }

            if (password.length < 6) {
                showModalError('Le mot de passe doit contenir au moins 6 caractères');
                return;
            }

            // Show loading state
            signupButton.disabled = true;
            signupButton.textContent = 'Inscription...';
            clearModalError();

            const result = await registerUser(email, password, fullName, role, isActive);

            if (result.success) {
                showSuccessMessage('Compte créé avec succès !');
                signupForm.style.display = 'none';
                
                // Auto-close modal after 2 seconds
                setTimeout(() => {
                    signupModal.classList.remove('show');
                    resetSignupForm();
                    signupForm.style.display = 'block';
                }, 2000);
            } else {
                showModalError(result.error);
                signupButton.disabled = false;
                signupButton.textContent = 'S\'inscrire';
            }
        }

        signupForm.addEventListener('submit', handleSignup);
    </script>
</body>
</html>
